<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
    font-family:'Segoe UI';
}

/* CONTAINER */
.container{
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

/* TITLE */
h2{
    text-align:center;
    margin-bottom:25px;
}

/* CARD */
.card{
    background:#0f172a;
    padding:20px;
    border-radius:14px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

/* PROGRESS BAR */
.bar{
    width:100%;
    height:12px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    transition:0.5s;
}

/* SUBJECT ROW */
.subject{
    margin-top:10px;
}

/* STATUS */
.warning{
    color:#ef4444;
    font-weight:bold;
}

.good{
    color:#22c55e;
    font-weight:bold;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#ef4444;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 Student Dashboard</h2>

<!-- OVERALL -->
<div class="card">
<h3>Your Attendance</h3>
<p id="percent">Loading...</p>

<div class="bar">
<div id="fill" class="fill" style="width:0%"></div>
</div>
</div>

<!-- SUBJECT WISE -->
<div class="card">
<h3>📊 Subject-wise Attendance</h3>

<div id="subjects"></div>

</div>

<!-- STATUS -->
<div class="card">
<h3>Status</h3>
<p id="warning"></p>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

function logout(){
    window.location.href="/logout";
}

/* FETCH DATA */
fetch("/student_dashboard")
.then(r=>r.json())
.then(d=>{

    // overall
    document.getElementById("percent").innerText = d.percentage + "%";
    document.getElementById("fill").style.width = d.percentage + "%";

    // status
    if(d.percentage < 75){
        document.getElementById("warning").innerHTML =
        "<span class='warning'>⚠ Low Attendance</span>";
    } else {
        document.getElementById("warning").innerHTML =
        "<span class='good'>✔ Good Standing</span>";
    }

    // 🔥 SUBJECT DATA (NEW)
    let html = "";

    d.subjects.forEach(s=>{
        html += `
        <div class="subject">
            <p>${s.subject} - ${s.percentage}%</p>
            <div class="bar">
                <div class="fill" style="width:${s.percentage}%"></div>
            </div>
        </div>
        `;
    });

    document.getElementById("subjects").innerHTML = html;

});
</script>

</body>
</html>
