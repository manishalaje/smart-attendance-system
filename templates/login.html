<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top,#0f172a,#020617);
    font-family:'Segoe UI', sans-serif;
    color:white;
}

/* CARD */
.card{
    background:rgba(15,23,42,0.85);
    padding:35px;
    border-radius:18px;
    width:340px;
    text-align:center;
    backdrop-filter:blur(14px);
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    animation:fadeIn 0.6s ease;
}

/* ICON */
.icon{
    font-size:42px;
    margin-bottom:10px;
}

/* TITLE */
h2{
    margin-bottom:5px;
    font-size:22px;
}

.small{
    color:#94a3b8;
    font-size:13px;
    margin-bottom:15px;
}

/* INPUT GROUP */
.input-group{
    position:relative;
}

.input-group span{
    position:absolute;
    left:10px;
    top:50%;
    transform:translateY(-50%);
    font-size:14px;
    color:#94a3b8;
}

input{
    width:100%;
    padding:12px 12px 12px 35px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1e293b;
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    background:#334155;
    box-shadow:0 0 8px #3b82f6;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#22c55e,#4ade80);
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 12px rgba(34,197,94,0.6);
}

/* LINK */
.link{
    margin-top:12px;
    font-size:13px;
}

.link a{
    color:#3b82f6;
    text-decoration:none;
}

.link a:hover{
    text-decoration:underline;
}

/* ERROR */
.error{
    color:#ef4444;
    font-size:13px;
    margin-top:10px;
}

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

<div class="icon">🤖</div>
<h2>Smart Attendance</h2>
<p class="small">AI Powered Face Recognition</p>

<form method="POST">

<div class="input-group">
<span>👤</span>
<input name="username" placeholder="Username" required>
</div>

<div class="input-group">
<span>🔒</span>
<input name="password" type="password" placeholder="Password" required>
</div>

<button>Login</button>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

</form>

<div class="link">
New user? <a href="/signup">Create account</a>
</div>

</div>

</body>
</html>
